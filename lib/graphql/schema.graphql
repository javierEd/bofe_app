type MutationRoot {
	createBoard(params: BoardParams!): BoardObject!
	createCard(params: CardParams!): CardObject!
	createList(params: ListParams!): ListObject!
	updateCardPosition(id: UUID!, position: Int!): CardObject!
	updateListPosition(id: UUID!, position: Int!): ListObject!
}

"""
Information about pagination in a connection
"""
type PageInfo {
	"""
