query BoardMembers($id: ID!, $first: Int, $after: UUID) {
    board(id: $id) {
        id
        members(first: $first, after: $after) {
            nodes {
                id
                isAdmin
                isEditable
                isRemovable
                user {
                    ...UserFragment
                }
                createdAt
                updatedAt
            }
            pageInfo {
                endCursor
                hasNextPage
            }
        }
        createdAt
        updatedAt
    }
}
