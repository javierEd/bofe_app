query BoardLists($idOrSlug: String!, $after: UUID, $first: Int) {
    board(idOrSlug: $idOrSlug) {
        id
        lists(after: $after, first: $first) {
            nodes {
                ...ListFragment
            }
            pageInfo {
                endCursor
            }
        }
        createdAt
        updatedAt
    }
}
