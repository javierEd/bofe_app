fragment CardFragment on CardObject {
    id
    position
    isEditable
    isMovable
    board {
        id
        slug
        user {
            ...UserFragment
        }
    }
    allLabels {
        ...LabelFragment
    }
    list {
        ...ListFragment
    }
    user {
        ...UserFragment
    }
    createdAt
    updatedAt
}
